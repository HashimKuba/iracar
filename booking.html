<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Your Reservation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .booking-container { display: flex; gap: 40px; padding: 50px 10%; margin-top: 50px; }
        .booking-form { flex: 2; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .summary-card { flex: 1; background: #fff; padding: 20px; border-radius: 10px; border: 2px solid var(--primary-color); height: fit-content; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .total-price { font-size: 24px; color: var(--primary-color); font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Drive<span>Baghdad</span></div>
        <a href="index.html" style="text-decoration: none; color: var(--primary-color);">← Back to Fleet</a>
    </nav>

    <div class="booking-container">
        <div class="booking-form">
            <h2>Personal Information</h2>
            <form id="final-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="user-name" required placeholder="Enter Your Name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="user-phone" required placeholder="07XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="user-age" min="18" required>
                </div>
                <div class="form-group">
                    <label>Rental Duration (Days)</label>
                    <input type="number" id="rental-days" value="1" min="1" required>
                </div>
                <button type="submit" class="btn-book" style="margin-top: 20px;">Confirm & Pay</button>
            </form>
        </div>

        <div class="summary-card" id="summary-section">
            <h3>Booking Summary</h3>
            <div id="car-details">
                </div>
            <div class="total-price" id="total-display">Total: $0</div>
        </div>
    </div>

    <script>
        // Load data from LocalStorage
        const selectedCar = JSON.parse(localStorage.getItem('selectedCar'));
        const carDetails = document.getElementById('car-details');
        const totalDisplay = document.getElementById('total-display');
        const daysInput = document.getElementById('rental-days');

        if (selectedCar) {
            carDetails.innerHTML = `
                <img src="${selectedCar.image}" style="width:100%; border-radius:5px;">
                <h4>${selectedCar.name}</h4>
                <p>Type: ${selectedCar.type}</p>
                <p>Price per day: $${selectedCar.price}</p>
            `;
            
            // Function to update price
            const updatePrice = () => {
                const total = daysInput.value * selectedCar.price;
                totalDisplay.innerText = `Total: $${total}`;
            };

            daysInput.addEventListener('input', updatePrice);
            updatePrice(); 
        }

        document.getElementById('final-form').onsubmit = (e) => {
            e.preventDefault();
            alert(`Thank you ${document.getElementById('user-name').value}! Your reservation for the ${selectedCar.name} is confirmed,We will contact you as soon as possiple.`);
            window.location.href = "index.html"; 
        };
    </script>
</body>
</html>
